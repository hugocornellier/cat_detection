name: cat_detection
description: "Cat face and landmark detection using on-device TFLite models."
version: 0.0.6
repository: https://github.com/hugocornellier/cat_detection

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  animal_detection: ^0.0.4
  opencv_dart: ^2.2.1+4
  flutter_litert: ^2.0.5
  meta: ^1.17.0
  http: ^1.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/models/cat_face_localizer.tflite
    - assets/models/cat_face_landmarks_full.tflite

  plugin:
    platforms:
      ios:
        dartPluginClass: CatDetectionDart
      android:
        dartPluginClass: CatDetectionDart
      macos:
        pluginClass: CatDetectionPlugin
      windows:
        pluginClass: CatDetectionPlugin
      linux:
        pluginClass: CatDetectionPlugin
